apiVersion: v1
kind: Service
metadata:
  name: {{ include "helm-smtp4dev.fullname" . }}
  labels:
    {{- include "helm-smtp4dev.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port | default 80 }}
      targetPort: {{ .Values.service.port | default 80 }}
      protocol: TCP
      name: http
    - port: {{ .Values.smtp4dev.ServerOptions__ImapPort | default 25 }}
      targetPort: {{ .Values.smtp4dev.ServerOptions__ImapPort | default 25 }}
      protocol: TCP
      name: smtp
    - port: {{ .Values.smtp4dev.ServerOptions__ImapPort | default 143 }}
      targetPort: {{ .Values.smtp4dev.ServerOptions__ImapPort | default 143 }}
      protocol: TCP
      name: imap
  selector:
    {{- include "helm-smtp4dev.selectorLabels" . | nindent 4 }}
