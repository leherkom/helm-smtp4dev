{{- if and .Values.route.enabled .Values.route.httpRedirect.enabled }}
{{- $fullName := include "helm-smtp4dev.fullname" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: {{ .Values.route.kind | default "HTTPRoute" }}
metadata:
  name: {{ $fullName }}-redirect
  labels:
    {{- include "helm-smtp4dev.labels" . | nindent 4 }}
  {{- with .Values.route.annotations }}
  annotations: {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.route.parentRefs }}
  parentRefs: {{ toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.route.hostnames }}
  hostnames: {{ tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
      {{- with .Values.route.matches }}
      matches: {{ toYaml . | nindent 8 }}
      {{- end }}
{{- end }}